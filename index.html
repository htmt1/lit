<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zatutakana — profile link</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Spline+Sans+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --white:#FFFFFF;
    --paper:#FDFDFB;
    --sakura:#E9ADB9;
    --matcha:#9DB88C;
    --sky:#A9C4E0;
    --sun:#EFD48F;
    --ink:#4A443F;
    --ink-soft:#9A938C;
    --line:#E9E5DF;
    --r:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:"Zen Maru Gothic",sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
    line-height:1.75;
  }

  .bg-dots{position:fixed;inset:0;z-index:-2;pointer-events:none;
    background-image:radial-gradient(circle, #E3DED6 1.3px, transparent 1.3px);
    background-size:22px 22px;
    mask-image:linear-gradient(180deg, #000 0%, rgba(0,0,0,.35) 40%, rgba(0,0,0,.5) 100%);
    -webkit-mask-image:linear-gradient(180deg, #000 0%, rgba(0,0,0,.35) 40%, rgba(0,0,0,.5) 100%);
  }

  .shape{position:fixed;z-index:-1;pointer-events:none;opacity:.5}
  .shape.circle{width:120px;height:120px;border:2px dashed var(--sakura);border-radius:50%;
    top:8%;right:-40px;animation:spin 60s linear infinite}
  .shape.circle2{width:70px;height:70px;border:2px solid var(--sky);border-radius:50%;
    bottom:18%;left:-24px;opacity:.4}
  .shape.tri{width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;
    border-bottom:26px solid var(--sun);top:42%;left:4%;opacity:.35;
    animation:sway 7s ease-in-out infinite}
  .shape.plus{top:66%;right:6%;font-size:30px;color:var(--matcha);font-weight:700;opacity:.4;
    animation:sway 9s ease-in-out infinite}
  .shape.dots3{top:24%;left:6%;display:flex;gap:7px}
  .shape.dots3 i{width:8px;height:8px;border-radius:50%;display:block}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes sway{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

  .wrap{max-width:560px;margin:0 auto;padding:56px 22px 72px;position:relative}

  header{margin-bottom:46px}
  .eyebrow{font-family:"Spline Sans Mono",monospace;font-size:11px;letter-spacing:.28em;
    color:var(--ink-soft);text-transform:uppercase;display:flex;align-items:center;gap:10px;margin-bottom:20px}
  .eyebrow::after{content:"";flex:1;max-width:90px;border-top:2px dotted var(--line)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .dot.p{background:var(--sakura)}
  .dot.g{background:var(--matcha)}
  .dot.b{background:var(--sky)}
  .dot.y{background:var(--sun)}

  .avatar{width:104px;height:104px;border-radius:50%;margin-bottom:20px;position:relative;
    border:3px solid var(--white);outline:2px solid var(--line);
    box-shadow:6px 6px 0 rgba(233,173,185,.25);}
  .avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block}
  .avatar::after{content:"";position:absolute;top:-4px;right:-4px;width:16px;height:16px;
    border-radius:50%;background:var(--matcha);border:3px solid var(--paper)}
  h1{font-size:29px;font-weight:700;letter-spacing:.04em;margin-bottom:2px}
  h1 small{font-size:14px;font-weight:500;color:var(--ink-soft);margin-left:10px;letter-spacing:.08em}
  .namebar{width:56px;height:4px;border-radius:4px;margin:10px 0 14px;
    background:linear-gradient(90deg, var(--sakura) 33%, var(--sun) 33% 66%, var(--matcha) 66%)}
  .bio{font-size:14px;color:var(--ink-soft);max-width:42ch}
  .bio b{color:var(--ink);font-weight:700;
    background:linear-gradient(transparent 68%, rgba(233,173,185,.35) 68%)}

  .sec{font-family:"Spline Sans Mono",monospace;font-size:11px;letter-spacing:.26em;
    text-transform:uppercase;color:var(--ink-soft);margin:44px 0 16px;
    display:flex;align-items:center;gap:10px}
  .sec .mark{width:9px;height:9px;border-radius:3px;transform:rotate(45deg)}
  .sec::after{content:"";flex:1;border-top:2px dotted var(--line)}

  .links{display:flex;flex-direction:column;gap:13px}
  .link{display:flex;align-items:center;gap:15px;padding:16px 18px;border-radius:var(--r);
    background:var(--white);border:1.5px solid var(--line);
    text-decoration:none;color:var(--ink);position:relative;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease}
  .link:hover{transform:translate(-2px,-2px);border-color:var(--ac, var(--sakura));
    box-shadow:4px 4px 0 var(--acs, rgba(233,173,185,.3))}
  .link:focus-visible{outline:2px solid var(--sakura);outline-offset:3px}
  .link .ic{width:42px;height:42px;border-radius:13px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:var(--paper);border:1.5px solid var(--line)}
  .link .ic svg{width:20px;height:20px;fill:var(--icol, var(--ink))}
  .link b{font-size:15px;font-weight:700;display:block;letter-spacing:.02em}
  .link small{font-size:12px;color:var(--ink-soft);display:block}
  .link .arrow{margin-left:auto;font-family:"Spline Sans Mono",monospace;font-size:13px;
    color:var(--ink-soft);transition:transform .18s ease}
  .link:hover .arrow{transform:translateX(4px);color:var(--ac, var(--sakura))}

  .tool{border-radius:var(--r);background:var(--white);border:1.5px solid var(--line);
    padding:20px;margin-bottom:14px}
  .tool h3{font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .tool h3 .tdot{width:9px;height:9px;border-radius:3px;transform:rotate(45deg)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .tool input[type=number], .tool textarea{
    font-family:inherit;font-size:14px;color:var(--ink);
    background:var(--paper);border:1.5px solid var(--line);border-radius:12px;
    padding:10px 14px;outline:none;transition:border .2s}
  .tool input[type=number]{width:110px}
  .tool textarea{width:100%;min-height:90px;resize:vertical}
  .tool input:focus, .tool textarea:focus{border-color:var(--matcha)}
  .btn{font-family:"Zen Maru Gothic",sans-serif;font-size:14px;font-weight:700;color:var(--ink);
    border:1.5px solid var(--ink);border-radius:12px;padding:9px 20px;cursor:pointer;
    background:var(--sun);box-shadow:3px 3px 0 rgba(74,68,63,.85);
    transition:transform .12s ease, box-shadow .12s ease}
  .btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 rgba(74,68,63,.85)}
  .btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(74,68,63,.85)}
  .result{font-family:"Spline Sans Mono",monospace;font-size:24px;font-weight:500;
    letter-spacing:.05em;min-height:34px;margin-top:12px;color:var(--ink)}
  .result::before{content:"» ";color:var(--sakura)}
  .counter{font-family:"Spline Sans Mono",monospace;font-size:12px;color:var(--ink-soft);
    margin-top:8px;display:flex;gap:18px;flex-wrap:wrap}
  .counter b{color:var(--ink);font-size:16px}

  .gift{border:1.5px dashed var(--sakura);background:var(--white)}
  .gift-note{font-size:13px;color:var(--ink-soft);margin-bottom:12px}
  .gift-btn{display:inline-flex;align-items:center;gap:10px;
    font-family:"Zen Maru Gothic",sans-serif;font-size:15px;font-weight:700;color:var(--ink);
    border:1.5px solid var(--ink);border-radius:14px;padding:13px 26px;cursor:pointer;text-decoration:none;
    background:var(--sakura);box-shadow:4px 4px 0 rgba(74,68,63,.85);
    animation:wiggle 3s ease-in-out infinite;
    transition:transform .12s ease, box-shadow .12s ease}
  .gift-btn:hover{transform:translate(-1px,-1px);box-shadow:5px 5px 0 rgba(74,68,63,.85)}
  .gift-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(74,68,63,.85)}
  @keyframes wiggle{0%,92%,100%{transform:rotate(0)}94%{transform:rotate(-2deg)}96%{transform:rotate(2deg)}98%{transform:rotate(-1deg)}}
  .gift-empty{font-family:"Spline Sans Mono",monospace;font-size:13px;color:var(--ink-soft);
    padding:10px 0 2px;letter-spacing:.08em}

  footer{margin-top:56px;text-align:center;font-family:"Spline Sans Mono",monospace;
    font-size:10.5px;letter-spacing:.24em;color:var(--ink-soft)}
  footer .dots{display:flex;justify-content:center;gap:8px;margin-bottom:10px}

  @media (max-width:520px){
    h1{font-size:25px}
    .shape.circle{width:90px;height:90px}
  }
  @media (prefers-reduced-motion:reduce){
    .shape,.gift-btn{animation:none}
    .link,.btn{transition:none}
  }
</style>
</head>
